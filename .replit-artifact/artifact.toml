kind = "web"
previewPath = "/"
title = "Discord Bot Landing Page"
version = "1.0.0"
id = "artifacts/discord-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20320

[services.development]
run = "pnpm --filter @workspace/discord-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-bot", "run", "build" ]
publicDir = "artifacts/discord-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20320"
BASE_PATH = "/"
